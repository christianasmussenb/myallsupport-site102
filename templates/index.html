<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyAllSupport - Inicio</title>
  <style>
    :root {
      --bg1: #f8fafc;
      --bg2: #e2e8f0;
      --ink: #102a43;
      --card: #ffffff;
      --accent: #0f766e;
      --accent-2: #115e59;
      --muted: #486581;
      --border: #d9e2ec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 15%, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(900px, 100%);
      background: color-mix(in srgb, var(--card) 92%, white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 40px rgba(16, 42, 67, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      background: #fff;
    }

    .path {
      display: inline-block;
      font-family: Consolas, "Courier New", monospace;
      background: #f0f4f8;
      border-radius: 8px;
      padding: 6px 10px;
      margin-bottom: 10px;
    }

    .desc {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Panel de Salud del Servicio</h1>
    <p class="subtitle">Selecciona una alternativa para consultar el estado del entorno.</p>

    <section class="grid">
      {% for item in endpoints %}
      <article class="card">
        <div class="path">{{ item.path }}</div>
        <p class="desc">{{ item.description }}</p>
        <a class="btn" href="{{ item.path }}">Abrir</a>
      </article>
      {% endfor %}
    </section>
  </main>
</body>
</html>
